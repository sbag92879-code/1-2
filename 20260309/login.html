<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        input{
        background-color: powderblue;
        width: 100%;
        font-size: 30px;
     }
     button{
        color: white;
        background-color: black;
        padding: 2rem;
        margin: 1rem;
        border: none;
        cursor: pointer;
        line-height: 16px;
        text-align: center;
}   
     button:hover{
        background-color: gray;
     }
    .mydiv{
    border: 5px solid black;  /* 테두리 속성값 */
    padding: 10px;/* 테두리를 기준으로 안쪽 여백 */
    display: flex;
    justify-content: space-around;
    }
    </style>

</head>
<body>
    <div class="mydiv">
        <label for="aa">id:</label>
        <input type="text" id="aa" name="id">
    </div>
        <div>

        <input type="password" name="password" id="password">
    </div>
    <button>로그인</button>
</div>

</html>
