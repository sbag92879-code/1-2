<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>간식 추천</title>
</head>
<style>
    body {
        background-color: rgb(245, 245, 245);
        font-family: "Noto Sans KR", sans-serif;
    }

    h1 {
        color: rgb(50, 80, 160);
    }

    .wrap {
        width: 600px;
        margin: 30px auto;
        padding: 20px;
        background-color: white;
        border-radius: 10px;
    }

    img {
        width: 100%;
        border-radius: 10px;
    }

    .menu_box {
        margin-top: 20px;
        padding: 15px;
        background-color: rgb(235, 242, 255);
        border-radius: 10px;
    }

    .menu_box li {
        margin-bottom: 8px;
    }

    .event_box {
        margin-top: 20px;
        padding: 15px;
        background-color: rgb(255, 241, 210);
        border-radius: 10px;
    }

    input {
        width: 400px;
        height: 34px;
    }

    button {
        height: 38px;
        background-color: rgb(50, 80, 160);
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;

    }

    button:hover {
        background-color: rgb(255, 120, 120);
    }
</style>


<body>

    <div class="wrap">
        <h1>우리 반 간식 소개 & 추첨</h1>
        <p>친구들과 먹고 싶은 간식을 소개하고 추첨하는 웹 페이지입니다.</p>
        <img src="snackbar-hero.png" alt="간식 사진">


        <div class="menu_box">
            <h2>인기 간식</h2>
            <ul id="menu_list">
            </ul>
        </div>

        <div class="menu_box">
            <h2>간식 추가하기</h2>
            <input placeholder="추가할 간식 이름" type="text" id="inputsnack">
            <button id="btn_add">추가</button>
        </div>

        <div class="event_box">
            <h2>오늘의 간식</h2>
            <p id="event_result">버튼을 누르면 간식이 추첨됩니다.</p>
            <button id="btn_event">간식 추첨</button>
        </div>
    </div>



</body>

<script>
let snacks = ["치즈 토스트", '딸기 에이드', '초코 쿠키'];

const renderSnack = function(snack){
    const li = document.createElement('li');
    li.textContent = snack;
    document.getElementById('menu_list').appendChild(li);

}
 for (let i =0; i < snacks.length; i++){
    renderSnack(snacks[i])
 }

 const addSnack = function(snack){
    if (snack){
        snacks.push(snack);
        return True;
    }
    return false;
}



</script>

</html>
